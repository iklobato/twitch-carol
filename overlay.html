<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<title>Stream Alerts</title>
<style>
  body { margin: 0; background: transparent; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
  #alert { position: fixed; top: 40px; left: 50%; transform: translateX(-50%) translateY(-200%);
           min-width: 360px; max-width: 80vw; padding: 20px 28px; border-radius: 16px;
           background: rgba(20, 16, 40, 0.92); color: #fff; text-align: center;
           box-shadow: 0 8px 40px rgba(124, 58, 237, 0.6); transition: transform .5s ease; }
  #alert.show { transform: translateX(-50%) translateY(0); }
  #headline { font-size: 28px; font-weight: 700; }
  #detail { font-size: 18px; opacity: .85; margin-top: 6px; }
  .pix_donation { box-shadow: 0 8px 40px rgba(16, 185, 129, 0.6); }
  .gift { box-shadow: 0 8px 40px rgba(244, 114, 182, 0.6); }
</style>
</head>
<body>
<div id="alert"><div id="headline"></div><div id="detail"></div></div>
<script>
  const box = document.getElementById('alert');
  const headline = document.getElementById('headline');
  const detail = document.getElementById('detail');
  const queue = [];
  let busy = false;

  function play(alert) {
    busy = true;
    box.className = alert.kind;
    headline.textContent = alert.headline;
    detail.textContent = alert.detail || '';
    box.classList.add('show');
    setTimeout(() => {
      box.classList.remove('show');
      setTimeout(() => { busy = false; pump(); }, 600);
    }, 6000);
  }

  function pump() { if (!busy && queue.length) play(queue.shift()); }

  function connect() {
    const ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onmessage = (event) => { queue.push(JSON.parse(event.data)); pump(); };
    ws.onclose = () => setTimeout(connect, 2000);
  }
  connect();
</script>
</body>
</html>
