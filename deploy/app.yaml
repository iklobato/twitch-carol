# DigitalOcean App Platform spec para o StreamIntel.
#
# Reusa a infra existente (nada de estado novo):
#   - Postgres: cluster compartilhado db-postgresql-nyc3-86715, via POOL PgBouncer
#     (porta 25061, transaction). DATABASE_URL aponta pro pool; ver core/db.py
#     (db_disable_prepared_statements=true).
#   - Valkey: financialdata-valkey (nyc1) para fila + dedup EventSub.
#   - Spaces: streamintel-audio (áudio + clipes).
#   - LLM: endpoint OpenAI-compatível (OpenRouter/Gradient/OpenAI) via llm_* envs,
#     não mais local. Hoje: OpenRouter.
#
# Segredos (type: SECRET) NÃO ficam neste arquivo: os valores são preenchidos no
# dashboard do App Platform, copiados do droplet. Aqui só os nomes.
#
# Deploy:  doctl apps create --spec deploy/app.yaml   (uma vez)
#          depois: git push na main -> deploy automático de cada componente.

name: streamintel
region: nyc

# Config compartilhada por todos os componentes (envs de app).
# Secrets ficam vazios aqui e são setados no dashboard (SECRET, criptografado).
envs:
  - key: LLM_BACKEND
    scope: RUN_AND_BUILD_TIME
    value: openai
  - key: LLM_BASE_URL # OpenRouter (troca aqui pra usar Gradient/OpenAI/Groq)
    scope: RUN_TIME
    value: https://openrouter.ai/api/v1
  - key: LLM_MODEL # default: resumos/picos/topicos
    scope: RUN_TIME
    value: anthropic/claude-haiku-4.5
  - key: LLM_MODEL_STRONG # tarefas de alto valor: recomendacoes + IA de seguidores
    scope: RUN_TIME
    value: anthropic/claude-sonnet-4.6
  - key: LLM_REQUIRE_PROVIDER_PARAMS # OpenRouter: garante json mode
    scope: RUN_TIME
    value: "true"
  - key: DB_DISABLE_PREPARED_STATEMENTS
    scope: RUN_TIME
    value: "true"
  - key: WHISPER_MODEL
    scope: RUN_TIME
    value: small
  - key: AUDIO_RETENTION_DAYS # backlog depth / history knob (owner key applies the bucket rule)
    scope: RUN_TIME
    value: "365"
  - key: WHISPER_COMPUTE_TYPE
    scope: RUN_TIME
    value: int8
  - key: TRANSCRIBE_BACKEND # remote = whisper via API, tira o whisper da CPU
    scope: RUN_TIME
    value: remote
  - key: TRANSCRIBE_BASE_URL # OpenRouter (mesma chave do LLM); Groq se o limite doer em escala
    scope: RUN_TIME
    value: https://openrouter.ai/api/v1
  - key: TRANSCRIBE_MODEL
    scope: RUN_TIME
    value: openai/whisper-large-v3-turbo
  - key: TRANSCRIBE_API_KEY # = a chave OpenRouter (mesma do LLM_API_KEY)
    scope: RUN_TIME
    type: SECRET
  - key: SENTRY_ENVIRONMENT
    scope: RUN_TIME
    value: production
  - key: PUBLIC_BASE_URL
    scope: RUN_TIME
    value: https://streamintel.cc
  # --- secrets: preencher no dashboard, copiando do droplet ---
  - key: FERNET_KEY
    scope: RUN_TIME
    type: SECRET
  - key: DATABASE_URL # pool: postgresql+psycopg://streamintel_app:...@...:25061/streamintel?sslmode=require
    scope: RUN_TIME
    type: SECRET
  - key: VALKEY_URL # financialdata-valkey (nyc1)
    scope: RUN_TIME
    type: SECRET
  - key: TWITCH_CLIENT_ID
    scope: RUN_TIME
    type: SECRET
  - key: TWITCH_CLIENT_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: TWITCH_EVENTSUB_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: SPACES_ENDPOINT
    scope: RUN_TIME
    type: SECRET
  - key: SPACES_REGION
    scope: RUN_TIME
    type: SECRET
  - key: SPACES_KEY
    scope: RUN_TIME
    type: SECRET
  - key: SPACES_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: SPACES_BUCKET
    scope: RUN_TIME
    type: SECRET
  - key: SENTRY_DSN
    scope: RUN_TIME
    type: SECRET
  - key: ADMIN_LOGINS
    scope: RUN_TIME
    type: SECRET
  - key: LLM_API_KEY # OpenRouter key sk-or-v1-... (preencher no dashboard/doctl)
    scope: RUN_TIME
    type: SECRET

# --- API (HTTP) ---
services:
  - name: api
    dockerfile_path: deploy/Dockerfile
    source_dir: /
    github:
      repo: iklobato/twitch-carol
      branch: main
      deploy_on_push: true
    run_command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    http_port: 8000
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    health_check:
      http_path: /healthz
    routes:
      # preserve_path_prefix: App Platform strips the matched prefix by default,
      # which would turn /api/me into /me (404). The API serves full paths.
      - path: /api
        preserve_path_prefix: true
      - path: /auth
        preserve_path_prefix: true
      - path: /eventsub
        preserve_path_prefix: true
      - path: /healthz
        preserve_path_prefix: true
      # /howto (no .html): App Platform static sites can't do extensionless
      # URLs, so the API serves this page. Screenshots live under /previews so
      # they stay outside this prefix and keep being served by the static site.
      - path: /howto
        preserve_path_prefix: true

# --- Front estático ---
static_sites:
  - name: web
    source_dir: apps/web
    github:
      repo: iklobato/twitch-carol
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    output_dir: dist
    routes:
      - path: /

# --- Workers (sem HTTP) ---
workers:
  - name: worker-capture
    dockerfile_path: deploy/Dockerfile
    source_dir: /
    github:
      repo: iklobato/twitch-carol
      branch: main
      deploy_on_push: true
    run_command: python -m workers.capture.main
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1

  - name: worker-transcribe
    dockerfile_path: deploy/Dockerfile
    source_dir: /
    github:
      repo: iklobato/twitch-carol
      branch: main
      deploy_on_push: true
    run_command: python -m workers.transcribe.main
    instance_size_slug: apps-s-1vcpu-2gb
    instance_count: 1 # <- o dial N: sobe pra drenar o backlog mais rápido

  - name: worker-analyze
    dockerfile_path: deploy/Dockerfile
    source_dir: /
    github:
      repo: iklobato/twitch-carol
      branch: main
      deploy_on_push: true
    run_command: python -m workers.analyze.main
    instance_size_slug: apps-s-1vcpu-1gb # leve: LLM remoto (OpenRouter)
    instance_count: 1

# --- Migração antes de cada deploy (idempotente) ---
jobs:
  - name: migrate
    kind: PRE_DEPLOY
    dockerfile_path: deploy/Dockerfile
    source_dir: /
    github:
      repo: iklobato/twitch-carol
      branch: main
    run_command: alembic upgrade head
    instance_size_slug: apps-s-1vcpu-0.5gb

# --- Anexa o cluster Postgres EXISTENTE (só pra trusted sources / rede) ---
# Não cria banco novo. A conexão real vem de DATABASE_URL (pool), acima.
databases:
  - name: streamintel-pg
    engine: PG
    cluster_name: db-postgresql-nyc3-86715
    production: true
